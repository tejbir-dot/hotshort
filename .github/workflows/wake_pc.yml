name: Wake HotShort PC

on:
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest

    steps:
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Wake PC via phone relay
        run: curl https://lived-cdna-nominations-psp.trycloudflare.com/wakepc
