name: Build & Push Worker Image

on:
  push:
    branches: [main]
    paths:
      - "runpodworker.py"
      - "Dockerfile.worker"
      - "requirements_worker.txt"
      - "cookies.txt"
      - "effects/**"
      - "utils/clipper.py"
      - "viral_finder/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hotshort-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hotshort-worker:${{ github.sha }}
          build-args: |
            WHISPER_MODEL=small
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ Pushed: ${{ secrets.DOCKERHUB_USERNAME }}/hotshort-worker:latest"
          echo "✅ Pushed: ${{ secrets.DOCKERHUB_USERNAME }}/hotshort-worker:${{ github.sha }}"
