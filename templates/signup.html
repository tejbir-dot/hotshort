<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up – HotShort Studio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #fff;
      background: radial-gradient(circle at 20% 20%, #0b0b0b, #1a0a00);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 16px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .glossy-bg::before, .glossy-bg::after {
      content: "";
      position: absolute;
      width: 250%;
      height: 250%;
      top: -75%;
      left: -75%;
      background: conic-gradient(
        from 0deg,
        rgba(255, 200, 100, 0.15),
        rgba(255, 240, 190, 0.2),
        rgba(255, 200, 80, 0.1),
        rgba(255, 240, 200, 0.2),
        rgba(255, 210, 120, 0.15)
      );
      animation: spin 15s linear infinite;
      filter: blur(120px);
      mix-blend-mode: screen;
      opacity: 0.7;
      z-index: -1;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 179, 71, 0.25);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 0 30px rgba(255, 179, 71, 0.2);
      text-align: center;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ffb347, #ffcc33);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #bbb;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 200, 100, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #ffb347;
      box-shadow: 0 0 8px rgba(255, 200, 100, 0.4);
    }

    button {
      background: linear-gradient(90deg, #ffb347, #ffcc33);
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 12px;
      width: 100%;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 200, 100, 0.4);
    }

    .google-btn {
      margin-bottom: 22px;
      width: 100%;
      max-width: 340px;
    }

    .google-btn a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      background: #fff;
      color: #202124;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .google-btn a:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    a {
      color: #ffb347;
      text-decoration: none;
      font-size: 0.9rem;
    }

    a:hover {
      text-shadow: 0 0 8px rgba(255, 200, 100, 0.5);
    }

    @media (max-width: 480px) {
      .signup-card {
        padding: 28px 22px;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, msg in messages %}
      <div style="
        background: rgba(255,200,100,0.1);
        border: 1px solid rgba(255,200,100,0.3);
        color: #ffcc66;
        padding: 12px;
        border-radius: 8px;
        margin: 10px auto;
        width: calc(100% - 32px);
        max-width: 520px;
        box-sizing: border-box;
        text-align: center;
        backdrop-filter: blur(5px);
      ">
        {{ msg }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

  <div class="glossy-bg"></div>

  <div class="signup-card">
    <h1>✨ Join HotShort Studio</h1>
    <p>Turn your ideas into viral clips.</p>
    <div class="google-btn">
      <a href="{{ url_for('auth.google_login', next=next_target|default('/dashboard')) }}">
        <svg viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path fill="#4285F4" d="M533.5 278.4c0-17.7-1.6-35-4.7-51.7H272v98h147.3c-6.4 34.5-25.5 63.7-54.3 83.3v68h87.7c51.4-47.4 80.8-116.9 80.8-197.6z"/>
          <path fill="#34A853" d="M272 544.3c73.7 0 135.6-24.4 180.8-66.4l-87.7-68c-24.4 16.5-55.5 26.4-93.1 26.4-71.6 0-132.4-48.3-154.1-113.2H29.4v71.1C74.8 482.5 168.4 544.3 272 544.3z"/>
          <path fill="#FBBC05" d="M117.9 326.7c-10.4-30.4-10.4-63 0-93.4V162.2H29.4c-38 76-38 166.7 0 242.7l88.5-78.2z"/>
          <path fill="#EA4335" d="M272 108.6c39.8 0 75.7 13.6 104 40.2l78.1-78.1C407.6 24 344.7 0 272 0 168.4 0 74.8 61.8 29.4 162.2l88.5 71.1C139.6 157 200.4 108.6 272 108.6z"/>
        </svg>
        <span>Sign up with Google</span>
      </a>
    </div>
    <form method="POST">
      <input type="hidden" name="next" value="{{ next_target|default('/dashboard') }}" />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="{{ url_for('auth.login', next=next_target|default('/dashboard')) }}">Login</a></p>
  </div>
</body>
</html>
