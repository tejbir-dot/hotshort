
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}HotShort Studio{% endblock %}</title>

  <!-- ✅ SINGLE SOURCE OF CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='branding/logo_icon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='branding/logo_icon.png') }}">

  <!-- Premium global styles -->
  <style>
    :root {
      --gold-100: #ffcf80;
      --gold-200: #ffb347;
      --bg-dark: #0b0b0b;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: #efe6d8;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,200,100,0.1);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      user-select: none;
    }

     .hotshort-logo {
       height: 38px;
       width: auto;
       object-fit: contain;
       filter:
         drop-shadow(0 0 6px rgba(255, 170, 70, 0.35))
         drop-shadow(0 0 18px rgba(255, 210, 140, 0.16));
       transition: transform 0.25s ease;
       flex: 0 0 auto;
     }

    .hotshort-logo:hover {
      transform: scale(1.05);
    }

    .brand-text {
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #ffcf80, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    main {
      flex: 1;
    }

    /* Toast Notification System */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease-out;
      pointer-events: auto;
      max-width: 320px;
      word-wrap: break-word;
    }

    .toast-error {
      background: linear-gradient(135deg, #ff6b6b, #ff5252);
      color: #fff;
      border-left: 4px solid #ff1744;
    }

    .toast-success {
      background: linear-gradient(135deg, #51cf66, #40c057);
      color: #fff;
      border-left: 4px solid #2f9e44;
    }

    .toast-info {
      background: linear-gradient(135deg, #4dabf7, #339af0);
      color: #fff;
      border-left: 4px solid #1971c2;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }

    .toast.fade-out {
      animation: slideOut 0.3s ease-out;
    }
  </style>

  <!-- JS -->
  <script defer src="{{ url_for('static', filename='js/dashboard.js', v='20260401a') }}"></script>
</head>

<body data-user-auth="{{ '1' if current_user.is_authenticated else '0' }}" data-backend-url="{{ FRONTEND_URL|default('', true) }}">

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Header (same for all pages) -->
  <header>
    <a class="brand-logo" href="/">
      <img class="hotshort-logo" src="{{ url_for('static', filename='branding/logo_icon.png') }}" alt="HotShort Logo" />
      <span class="brand-text">HotShort</span>
    </a>
  </header>

  <!-- Page Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Toast System Script -->
  <script>
    (function(){
      const container = document.getElementById('toastContainer');
      const messages = {{ get_flashed_messages(with_categories=true) | tojson }};
      
      function showToast(message, category = 'info', duration = 4000){
        if(!message) return;
        
        const toast = document.createElement('div');
        toast.className = `toast toast-${category}`;
        toast.textContent = message;
        toast.setAttribute('role', 'alert');
        
        container.appendChild(toast);
        
        // Auto-fade after duration
        if(duration){
          setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 300);
          }, duration);
        }
      }
      
      // Display server-side flash messages
      if(messages && Array.isArray(messages)){
        messages.forEach(([category, msg]) => {
          showToast(msg, category || 'info', 4500);
        });
      }
      
      // Expose globally for client-side toasts
      window.showToast = showToast;
    })();
  </script>
</body>
</html>
