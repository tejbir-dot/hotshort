<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake HotShort</title>
</head>
<body style="text-align:center;margin-top:80px;font-family:sans-serif;">
  <h2>Wake HotShort Server</h2>

  <button onclick="wakeServer()" style="padding:20px;font-size:20px;">
    Wake PC
  </button>

  <script>
    async function wakeServer() {
      try {
        await fetch("https://lived-cdna-nominations-psp.trycloudflare.com/wakepc");
        alert("Wake signal sent. Wait ~30 seconds then open HotShort.");
      } catch {
        alert("Wake failed. Phone relay offline.");
      }
    }
  </script>
</body>
</html>
