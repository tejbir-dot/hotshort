<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake HotShort</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: #fffaf2;
      --text: #1d1d1d;
      --muted: #6b6256;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --border: #dbcdb9;
      --danger: #b91c1c;
      --shadow: 0 20px 60px rgba(55, 35, 15, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(15, 118, 110, 0.16), transparent 34%),
        linear-gradient(180deg, #f9f4ec 0%, var(--bg) 100%);
      color: var(--text);
    }

    .card {
      width: min(100%, 520px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 32px 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.5rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .stack {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      color: var(--text);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.98rem;
      color: var(--text);
    }

    input:focus {
      outline: 2px solid rgba(15, 118, 110, 0.2);
      border-color: var(--accent);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: #ece4d8;
      color: var(--text);
    }

    .danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .meta {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(15, 118, 110, 0.07);
      border: 1px solid rgba(15, 118, 110, 0.16);
      font-size: 0.95rem;
      color: var(--muted);
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      font-weight: 600;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--accent-dark);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Wake HotShort</h1>
    <p>Tap once to trigger the GitHub wake workflow, wait for the PC to boot, then open the HotShort UI.</p>

    <div class="stack">
      <label for="uiUrl">
        HotShort UI URL
        <input id="uiUrl" type="url" placeholder="https://your-ngrok-or-domain-url" autocomplete="off">
      </label>

      <label for="githubToken">
        GitHub token
        <input id="githubToken" type="password" placeholder="Fine-grained token with Actions: write" autocomplete="off">
      </label>
    </div>

    <div class="actions">
      <button id="wakeButton" class="primary" type="button">Analyze (Wake PC)</button>
      <button id="saveButton" class="secondary" type="button">Save Token + URL On This Device</button>
      <button id="clearButton" class="danger" type="button">Clear Saved Token</button>
    </div>

    <div class="meta">
      Repo: <strong id="repoName"></strong><br>
      Workflow: <strong id="workflowName"></strong><br>
      Ref: <strong id="refName"></strong><br>
      Auto-open delay: <strong id="delayValue"></strong> seconds
    </div>

    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script>
    const config = {
      owner: "tejbirsingh949",
      repo: "hotshort",
      workflow: "wake_pc.yml",
      ref: "main",
      bootWaitSeconds: 30,
      storageKeys: {
        token: "hotshort_wake_github_token",
        uiUrl: "hotshort_wake_ui_url"
      }
    };

    const repoSlug = `${config.owner}/${config.repo}`;
    const dispatchUrl = `https://api.github.com/repos/${repoSlug}/actions/workflows/${config.workflow}/dispatches`;

    const uiUrlInput = document.getElementById("uiUrl");
    const githubTokenInput = document.getElementById("githubToken");
    const wakeButton = document.getElementById("wakeButton");
    const saveButton = document.getElementById("saveButton");
    const clearButton = document.getElementById("clearButton");
    const statusEl = document.getElementById("status");

    document.getElementById("repoName").textContent = repoSlug;
    document.getElementById("workflowName").textContent = config.workflow;
    document.getElementById("refName").textContent = config.ref;
    document.getElementById("delayValue").textContent = String(config.bootWaitSeconds);

    uiUrlInput.value = localStorage.getItem(config.storageKeys.uiUrl) || "";
    githubTokenInput.value = localStorage.getItem(config.storageKeys.token) || "";

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function saveConfig() {
      const token = githubTokenInput.value.trim();
      const uiUrl = uiUrlInput.value.trim();

      if (!token) {
        setStatus("GitHub token missing. Enter token first.", "error");
        return false;
      }

      if (!uiUrl) {
        setStatus("HotShort UI URL missing. Enter ngrok or domain URL first.", "error");
        return false;
      }

      localStorage.setItem(config.storageKeys.token, token);
      localStorage.setItem(config.storageKeys.uiUrl, uiUrl);
      setStatus("Token and UI URL saved on this device.", "ok");
      return true;
    }

    async function wakeServer() {
      const token = githubTokenInput.value.trim();
      const uiUrl = uiUrlInput.value.trim();

      if (!token) {
        setStatus("Enter a GitHub token before waking the server.", "error");
        githubTokenInput.focus();
        return;
      }

      if (!uiUrl) {
        setStatus("Enter the HotShort UI URL before waking the server.", "error");
        uiUrlInput.focus();
        return;
      }

      wakeButton.disabled = true;
      setStatus("Sending wake workflow to GitHub...", "");

      try {
        const response = await fetch(dispatchUrl, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ ref: config.ref })
        });

        if (!response.ok) {
          const details = await response.text();
          throw new Error(`GitHub rejected the request (${response.status}). ${details}`);
        }

        localStorage.setItem(config.storageKeys.token, token);
        localStorage.setItem(config.storageKeys.uiUrl, uiUrl);

        setStatus(`Wake sent. Waiting ${config.bootWaitSeconds} seconds before opening HotShort...`, "ok");
        await sleep(config.bootWaitSeconds * 1000);
        window.location.href = uiUrl;
      } catch (error) {
        setStatus(error.message || "Wake request failed.", "error");
      } finally {
        wakeButton.disabled = false;
      }
    }

    wakeButton.addEventListener("click", wakeServer);
    saveButton.addEventListener("click", saveConfig);
    clearButton.addEventListener("click", () => {
      localStorage.removeItem(config.storageKeys.token);
      githubTokenInput.value = "";
      setStatus("Saved GitHub token removed from this device.", "ok");
    });
  </script>
</body>
</html>
